services:
  - type: web
    name: resume-ai-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: backend-storage
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/app.db
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: GENERATED_DIR
        value: /app/data/generated
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false # Set this value manually in the Render Dashboard
      - key: SECRET_KEY
        generateValue: true # Generates a secure random JWT key automatically
